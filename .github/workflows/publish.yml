# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes to be published via
# GitHub Actions with npm provenance statements. This workflow satisfies that
# requirement. Provenance lets anyone cryptographically verify that a package
# was built by this exact workflow, from this exact repository and commit.
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# @n8n/node-cli ≥ 0.23.0 is required. Earlier versions do not support the
# provenance flag passed by `npm run release` in CI, and the publish step will
# fail. Check the version installed in this project with:
#
#   npm list @n8n/node-cli
#
# To upgrade:
#
#   npm install --save-dev @n8n/node-cli@latest
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. Log in to npmjs.com and open your package's settings.
#   2. Under "Publish access" → "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: <your-github-username-or-org>
#        Repository name:  <your-repo-name>
#        Workflow name:    publish.yml
#        Environment:      (leave blank unless you use GitHub Environments)
#   4. For OIDC only: do not set the NPM_TOKEN secret (or leave it unset). A stale
#      secret still forces broken token auth. OIDC + setup-node needs an explicit
#      empty NODE_AUTH_TOKEN when publishing — see setup-node#1440.
#
# Option B — npm token (fallback):
#   1. On npmjs.com: Granular Access Token with Read and write for this package.
#   2. In GitHub, store it as NPM_TOKEN either:
#        • Repository secret: Settings → Secrets and variables → Actions, OR
#        • Environment secret: you MUST set `environment:` on the job below to that
#          environment’s name (e.g. environment: NPM_TOKEN), or secrets.NPM_TOKEN is empty.
#
# Both options work with --provenance. Provenance is signed by GitHub's OIDC
# infrastructure regardless of how npm authentication is handled.
#
# ─── TAG CONVENTION ────────────────────────────────────────────────────────────
#
# This workflow triggers on tags matching "*.*.*" (e.g. 0.2.0).
# If you prefer tags with a "v" prefix (e.g. v0.2.0), change the filter to:
#   tags: ['v*.*.*']
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Run the following command locally to start an interactive release:
#
#   npm run release
#
# This will lint, build, prompt for a version bump, update the changelog,
# commit, tag, and push — which triggers this workflow to publish to npm.

name: Publish

on:
  push:
    tags:
      # Matches 0.1.0, 1.2.3, 2.0.0-rc.1, etc.
      # See "TAG CONVENTION" above if you prefer tags with a "v" prefix.
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Required when NPM_TOKEN is an *environment* secret (not a repository secret).
    # Must match the GitHub Environment name exactly. Remove if NPM_TOKEN is repo-level only.
    environment: NPM_TOKEN

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default (write) for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@v4

      # No registry-url: it injects deprecated always-auth into ~/.npmrc (npm 11 warns) and
      # is not required for public npm ci. Auth for publish is set explicitly below.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14'
          cache: 'npm'

      # OIDC registry token exchange + publish requires npm CLI ≥11.5.1 (npm docs).
      - name: Upgrade npm for registry publish
        run: npm install -g npm@^11.5.1 && node -v && npm -v

      - name: Install dependencies
        run: npm ci

      # CI must call `npm publish` in this shell so NODE_AUTH_TOKEN (token or empty for OIDC)
      # is guaranteed for the publish process. `n8n-node release` spawns npm publish with a
      # partial env object which can drop OIDC/token auth and yield ENEEDAUTH.
      - name: Lint, build, and publish
        run: |
          set -euo pipefail
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          unset NODE_AUTH_TOKEN || true
          export RELEASE_MODE=true
          export NPM_CONFIG_PROVENANCE=true
          npm run lint
          npm run build
          # Trim accidental newlines from GitHub secret values
          NPM_TOKEN="$(printf '%s' "${NPM_TOKEN:-}")"
          export NPM_TOKEN
          if [ -n "$NPM_TOKEN" ]; then
            echo "Token publish path (NPM_TOKEN length: ${#NPM_TOKEN} chars)"
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN" --location=project
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
            echo "npm whoami:"
            npm whoami
            npm publish --access public --registry=https://registry.npmjs.org/
          else
            echo "OIDC path — NPM_TOKEN empty; Trusted Publishers + NODE_AUTH_TOKEN=\"\""
            NODE_AUTH_TOKEN="" npm publish --access public --registry=https://registry.npmjs.org/
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
